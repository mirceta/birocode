      <h1>Queued prompts</h1>
      <p class="lede">An agent can only run one prompt at a time. <b>Queued prompts</b>
        let you line up the next ones <em>while it's busy</em>. Nothing runs on its
        own — when the agent is free you <em>approve</em> each one to send it, or
        tap <em>×</em> to delete it.</p>
