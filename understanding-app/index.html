<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Harness Event Feed — what we're building (pilot)</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --edge:#30363d;
    --ink:#e6edf3; --dim:#9aa7b4; --accent:#58a6ff; --good:#3fb950;
    --warn:#d29922; --bad:#f85149; --turn:#bc8cff; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,Segoe UI,Roboto,sans-serif}
  header{padding:22px 24px 10px;border-bottom:1px solid var(--edge)}
  h1{margin:0 0 4px;font-size:21px}
  .sub{color:var(--dim);font-size:13.5px}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 24px 0}
  .tab{padding:8px 14px;border:1px solid var(--edge);border-bottom:none;border-radius:8px 8px 0 0;
       background:var(--panel);color:var(--dim);cursor:pointer;font-size:13.5px}
  .tab.active{background:var(--panel2);color:var(--ink);border-color:var(--accent)}
  main{padding:20px 24px 60px;max-width:1040px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  h2{font-size:17px;margin:6px 0 10px}
  p{color:#cdd6e0}
  .card{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:16px 18px;margin:12px 0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  code,.mono{font-family:var(--mono);font-size:12.8px}
  .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11.5px;border:1px solid var(--edge);color:var(--dim)}
  .pill.now{color:var(--good);border-color:var(--good)}
  .pill.future{color:var(--turn);border-color:var(--turn)}
  .pill.ro{color:var(--accent);border-color:var(--accent)}
  ul{margin:8px 0;padding-left:20px}
  li{margin:5px 0;color:#cdd6e0}
  .muted{color:var(--dim)}
  .kvs{font-family:var(--mono);font-size:12.6px;background:#0b0f14;border:1px solid var(--edge);border-radius:8px;padding:12px;white-space:pre;overflow:auto;color:#cdd6e0}
  .tag{color:var(--turn)} .str{color:#7ee787} .key{color:var(--accent)} .num{color:#ffa657}

  /* flow simulator */
  .flow{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
  .node{flex:1;min-width:150px;background:var(--panel2);border:1px solid var(--edge);border-radius:10px;
        padding:12px;margin:6px;transition:.3s;position:relative}
  .node.lit{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 18px -6px var(--accent)}
  .node .t{font-weight:600;font-size:13.5px}
  .node .d{font-size:12px;color:var(--dim);margin-top:4px}
  .node .badge{position:absolute;top:-9px;right:8px;font-size:10.5px;padding:1px 7px;border-radius:20px;background:var(--bg);border:1px solid var(--edge);color:var(--dim)}
  .arrow{align-self:center;color:var(--dim);font-size:20px;padding:0 2px}
  .controls{display:flex;gap:8px;align-items:center;margin:14px 0}
  button.run{background:var(--accent);color:#08111f;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13.5px}
  button.run:disabled{opacity:.5;cursor:default}
  button.ghost{background:transparent;color:var(--dim);border:1px solid var(--edge);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px}
  .log{margin-top:14px;background:#0b0f14;border:1px solid var(--edge);border-radius:8px;min-height:120px;padding:10px 12px;font-family:var(--mono);font-size:12.4px}
  .log .ln{padding:2px 0;border-bottom:1px dashed #1d2430;opacity:0;animation:fade .3s forwards}
  .log .ln:last-child{border-bottom:none}
  .ok{color:var(--good)} .er{color:var(--bad)} .tn{color:var(--turn)} .ac{color:var(--accent)}
  .feedrow{font-family:var(--mono);font-size:12.2px;padding:6px 8px;border:1px solid var(--edge);border-radius:6px;margin:5px 0;background:var(--panel2)}
  .stepnote{min-height:22px;color:var(--accent);font-size:13px;margin-top:8px}
  .legend{font-size:12px;color:var(--dim);margin-top:8px}
  .scope{display:flex;gap:14px;flex-wrap:wrap}
  .harness{flex:1;min-width:200px;border:1px dashed var(--edge);border-radius:10px;padding:12px;background:var(--panel)}
  .harness h4{margin:0 0 6px;font-size:13.5px}
  .col{border:1px solid var(--turn);border-radius:10px;padding:12px;background:rgba(188,140,255,.06)}
  .warnbox{border-left:3px solid var(--warn);padding:8px 12px;background:rgba(210,153,34,.07);border-radius:6px;margin:10px 0}
</style>
</head>
<body>
<header>
  <h1>Harness Event Feed — the pilot, as I understand it</h1>
  <div class="sub">Read-only REST exposure of harness events · seeded with <b>turn.ended</b> · plus an in-repo app that consumes it · OpenSpec change <code>add-harness-event-feed</code></div>
</header>

<div class="tabs" id="tabs"></div>
<main id="main"></main>

<script>
const VIEWS = [
  {id:"ask",   label:"What you asked for"},
  {id:"scope", label:"Pilot now · collector later"},
  {id:"flow",  label:"The turn-ended flow ▶"},
  {id:"env",   label:"The general mechanism"},
  {id:"rules", label:"The hard constraints"},
];

const MAIN = document.getElementById("main");
const TABS = document.getElementById("tabs");

VIEWS.forEach((v,i)=>{
  const b=document.createElement("div");
  b.className="tab"+(i===0?" active":"");
  b.textContent=v.label; b.dataset.id=v.id;
  b.onclick=()=>select(v.id);
  TABS.appendChild(b);
  const sec=document.createElement("section");
  sec.className="view"+(i===0?" active":"");
  sec.id="view-"+v.id;
  MAIN.appendChild(sec);
});
function select(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.id===id));
  document.querySelectorAll(".view").forEach(s=>s.classList.toggle("active",s.id==="view-"+id));
}

/* ---------- View: the ask ---------- */
document.getElementById("view-ask").innerHTML = `
  <h2>What I think you want me to prove I understand</h2>
  <p>We want our harness to <b>publish what is happening inside it</b> so something outside
  can watch — without ever letting that outside thing <i>do</i> anything to the harness.</p>
  <div class="grid2">
    <div class="card">
      <h4 style="margin:0 0 6px">The five pieces</h4>
      <ul>
        <li><b>Make harness events visible over the web</b> — a read-only REST surface.</li>
        <li><b>The first event: an agent's turn ending</b> — the moment a chat run finishes.</li>
        <li><b>A local app in this repo</b> that consumes the feed and proves the events arrive.</li>
        <li><b>A general, extensible mechanism</b> — built so we add more event types later, and so the test app doubles as a test bed for them.</li>
        <li><b>A pilot only</b> — the real prize (a service + app on another computer collecting from many harnesses) is a <span class="pill future">future task</span>.</li>
      </ul>
    </div>
    <div class="card">
      <h4 style="margin:0 0 6px">The one rule I must not break</h4>
      <div class="warnbox">No new <b>actions</b> over REST. Nothing exposed that isn't already
      reachable from the frontend. The feed <b>reports</b> events — it never <b>causes</b> harness actions.</div>
      <p class="muted" style="font-size:13px">So everything I add is a <code>GET</code> with no side effects,
      behind the harness's existing login.</p>
    </div>
  </div>
  <div class="card">
    <h4 style="margin:0 0 6px">Good news: the foundation is already here</h4>
    <p style="margin:0">The harness already has a proven per-repo event log
    (<code>RepoEventLog</code> + <code>GET /api/repos/{id}/events?after=N</code> + the dock's Event Console).
    I'll reuse that <i>pattern</i> — ring buffer, monotonic <code>seq</code>, watermark polling — but at
    <b>harness scope</b>, because a collector wants <b>one stream per harness</b>, not one per repo. And the
    per-repo log deliberately excludes turn lifecycle, so this is genuinely new surface, not a duplicate.</p>
  </div>
`;

/* ---------- View: scope (pilot vs future) ---------- */
document.getElementById("view-scope").innerHTML = `
  <h2>Where the line is: pilot now, collector later</h2>
  <div class="scope">
    <div class="harness">
      <h4>NOW — the pilot <span class="pill now">this change</span></h4>
      <div class="node lit" style="margin:6px 0"><div class="t">One harness (this one)</div>
        <div class="d">publishes <span class="tn">turn.ended</span> to an in-memory feed</div></div>
      <div style="text-align:center;color:var(--dim)">↓ <code>GET /api/events?after=N</code> (read-only)</div>
      <div class="node lit" style="margin:6px 0"><div class="t">In-repo test app</div>
        <div class="d">polls the feed, renders the stream, proves it works</div></div>
    </div>
    <div class="col">
      <h4 style="margin:0 0 6px">LATER — the real goal <span class="pill future">future task</span></h4>
      <p style="font-size:13px;margin:6px 0">A <b>separate service + app on another computer</b> that:</p>
      <ul style="font-size:13px">
        <li>polls the same <code>/api/events</code> on <b>many harnesses</b>,</li>
        <li>fans them into one place,</li>
        <li>and <b>reacts</b> to what it sees.</li>
      </ul>
      <p class="muted" style="font-size:12.5px;margin-top:8px">Out of scope now — including how a remote
      reader authenticates to many harnesses. The pilot just has to make the first link real.</p>
    </div>
  </div>
  <div class="card">
    <p style="margin:0">The in-repo test app is the <b>stand-in for that future collector</b>. If it can read
    <span class="tn">turn.ended</span> off the feed today, the future service reads the same shape — just from
    several boxes at once.</p>
  </div>
`;

/* ---------- View: flow simulator ---------- */
document.getElementById("view-flow").innerHTML = `
  <h2>How a "turn ended" event travels (step it through)</h2>
  <div class="flow" id="flowNodes"></div>
  <div class="controls">
    <button class="run" id="runBtn">▶ Run a turn (success)</button>
    <button class="ghost" id="errBtn">Run a turn (error)</button>
    <button class="ghost" id="resetBtn">Reset</button>
  </div>
  <div class="stepnote" id="stepNote">Press “Run a turn” to watch one event flow from chat → feed → the test app.</div>
  <div class="grid2">
    <div>
      <h4 style="margin:14px 0 4px;font-size:13.5px">Harness log</h4>
      <div class="log" id="flowLog"></div>
    </div>
    <div>
      <h4 style="margin:14px 0 4px;font-size:13.5px">Test app — feed view <span class="pill ro">read-only</span></h4>
      <div class="log" id="appFeed"><div class="muted" style="opacity:1">— waiting for events —</div></div>
    </div>
  </div>
  <div class="legend">The test app only ever <b>reads</b> <code>GET /api/events</code> and advances a watermark. It cannot push anything back.</div>
`;

const NODES = [
  {t:"Chat run",        d:"agent turn launched (POST /api/chat)", badge:"existing"},
  {t:"CliRunnerService",d:"detects the turn's terminal result", badge:"existing hook"},
  {t:"HarnessEventFeed",d:"append turn.ended (seq++, best-effort)", badge:"NEW"},
  {t:"GET /api/events", d:"read-only, watermark-paged", badge:"NEW"},
  {t:"Test app",        d:"polls, renders the stream", badge:"NEW (in-repo)"},
];
const fn=document.getElementById("flowNodes");
NODES.forEach((n,i)=>{
  if(i) {const a=document.createElement("div");a.className="arrow";a.textContent="→";fn.appendChild(a);}
  const d=document.createElement("div");d.className="node";d.id="fnode"+i;
  d.innerHTML=`<span class="badge">${n.badge}</span><div class="t">${n.t}</div><div class="d">${n.d}</div>`;
  fn.appendChild(d);
});

let seq = 41, running=false;
const flowLog=document.getElementById("flowLog");
const appFeed=document.getElementById("appFeed");
const stepNote=document.getElementById("stepNote");

function addLn(box,html,cls){const l=document.createElement("div");l.className="ln "+(cls||"");l.innerHTML=html;box.appendChild(l);box.scrollTop=box.scrollHeight;}
function lit(i,on){const el=document.getElementById("fnode"+i);if(el)el.classList.toggle("lit",on);}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

async function runTurn(ok){
  if(running) return; running=true;
  document.getElementById("runBtn").disabled=true;
  for(let i=0;i<5;i++) lit(i,false);
  seq++;
  const ev = ok
    ? {seq, type:"turn.ended", source:{repoId:"kekik"}, data:{sessionId:"a91c…", status:"done", costUsd:0.0142, numTurns:3}}
    : {seq, type:"turn.ended", source:{repoId:"kekik"}, data:{sessionId:"b07f…", status:"error"}};

  stepNote.textContent="1 · A chat run is launched on a repo.";
  lit(0,true); addLn(flowLog,'<span class="ac">POST /api/chat</span> → run started (repo kekik)'); await wait(800);

  stepNote.textContent="2 · The harness sees the run's terminal result (the moment it already detects).";
  lit(0,false);lit(1,true);
  addLn(flowLog, ok?'CliRunnerService.HandleResult → <span class="ok">done</span>':'CliRunnerService.HandleResult → <span class="er">error</span>'); await wait(900);

  stepNote.textContent="3 · It publishes a turn.ended event to the feed — best-effort, can never break the run.";
  lit(1,false);lit(2,true);
  addLn(flowLog,'HarnessEventFeed.Publish(<span class="tn">turn.ended</span>) seq='+seq+' <span class="muted">(best-effort)</span>'); await wait(900);

  stepNote.textContent="4 · The test app's next poll asks for events after its watermark.";
  lit(2,false);lit(3,true);
  addLn(appFeed,'<span class="ac">GET /api/events?after='+(seq-1)+'</span>',''); await wait(800);

  stepNote.textContent="5 · It receives the event and renders it. Nothing flows back to the harness.";
  lit(3,false);lit(4,true);
  if(appFeed.querySelector('.muted')) appFeed.innerHTML='';
  const st = ok?'<span class="ok">done</span>':'<span class="er">error</span>';
  addLn(appFeed,`<b class="tn">turn.ended</b> #${seq} · repo <b>kekik</b> · session ${ev.data.sessionId} · ${st}`+(ok?` · $${ev.data.costUsd}`:''),'');
  await wait(600); lit(4,false);
  stepNote.textContent="Done. One turn → one read-only event the future collector could fan in.";
  running=false; document.getElementById("runBtn").disabled=false;
}
document.getElementById("runBtn").onclick=()=>runTurn(true);
document.getElementById("errBtn").onclick=()=>runTurn(false);
document.getElementById("resetBtn").onclick=()=>{flowLog.innerHTML="";appFeed.innerHTML='<div class="muted" style="opacity:1">— waiting for events —</div>';seq=41;stepNote.textContent="Reset.";for(let i=0;i<5;i++)lit(i,false);};

/* ---------- View: envelope ---------- */
document.getElementById("view-env").innerHTML = `
  <h2>The general mechanism: one envelope, many types</h2>
  <p>The point isn't just <span class="tn">turn.ended</span> — it's a <b>shape we can grow</b>. Every event has the
  same outer envelope; the <code>type</code> field is the extension point and <code>data</code> carries the
  type-specific payload.</p>
  <div class="grid2">
    <div class="card">
      <h4 style="margin:0 0 8px">The envelope (stable)</h4>
      <div class="kvs">{
  <span class="key">"seq"</span>:    <span class="num">42</span>,        <span class="muted">// harness-wide, monotonic</span>
  <span class="key">"at"</span>:     <span class="num">1751...</span>,   <span class="muted">// epoch ms</span>
  <span class="key">"type"</span>:   <span class="str">"turn.ended"</span>,<span class="muted"> // the extension point</span>
  <span class="key">"source"</span>: { <span class="key">"repoId"</span>: <span class="str">"kekik"</span> },
  <span class="key">"data"</span>:   { ... }      <span class="muted">// shape depends on type</span>
}</div>
    </div>
    <div class="card">
      <h4 style="margin:0 0 8px">turn.ended payload (seeded)</h4>
      <div class="kvs"><span class="key">"data"</span>: {
  <span class="key">"sessionId"</span>: <span class="str">"a91c…"</span>,
  <span class="key">"status"</span>:    <span class="str">"done"</span>,   <span class="muted">// or "error"</span>
  <span class="key">"costUsd"</span>:   <span class="num">0.0142</span>,
  <span class="key">"numTurns"</span>:  <span class="num">3</span>
}</div>
      <p class="muted" style="font-size:12.5px;margin-bottom:0">Only data the harness <b>already has</b> at turn-end — no new agent instrumentation.</p>
    </div>
  </div>
  <div class="card">
    <h4 style="margin:0 0 8px">Why this makes "add more later" cheap</h4>
    <p style="margin:0 0 8px">Future events just pick a new <code>type</code> and reuse everything else —
    the same buffer, the same <code>GET /api/events</code>, the same watermark, the same parser:</p>
    <div class="feedrow"><span class="tag">run.started</span> · repo · sessionId</div>
    <div class="feedrow"><span class="tag">deploy.done</span> · repo · status, durationMs</div>
    <div class="feedrow"><span class="tag">tool.flagged</span> · repo · toolName, reason</div>
    <p class="muted" style="font-size:12.5px;margin:8px 0 0">The test app renders any <code>type</code> generically
    from the envelope — so it's the test bed for these without changes.</p>
  </div>
`;

/* ---------- View: rules ---------- */
document.getElementById("view-rules").innerHTML = `
  <h2>The constraints I'm holding myself to</h2>
  <div class="card">
    <h4 style="margin:0 0 6px"><span class="pill ro">read-only</span> No actions over REST</h4>
    <p style="margin:0">The only endpoint added is a <code>GET</code> with no side effects. No mutation endpoint,
    nothing exposed that isn't already reachable from the frontend. Reading the feed can never trigger a harness action.</p>
  </div>
  <div class="card">
    <h4 style="margin:0 0 6px">Auth is inherited, not invented</h4>
    <p style="margin:0">The feed lives under <code>/api/*</code>, so the existing login (session cookie or
    <code>X-Auth-Password</code>) already guards it. No new auth surface in the pilot. <span class="muted">How a remote
    collector authenticates to many harnesses is the future task's problem.</span></p>
  </div>
  <div class="card">
    <h4 style="margin:0 0 6px">Additive &amp; safe by construction</h4>
    <ul style="margin:0">
      <li>New service + one read-only controller + one best-effort publish call + one static app.</li>
      <li>Publishing <span class="tn">turn.ended</span> is wrapped so it can <b>never</b> disrupt a chat run.</li>
      <li>The existing per-repo <code>/api/repos/{id}/events</code> + Event Console are untouched.</li>
      <li>In-memory only — no persistence across restart (a pilot, like the per-repo log).</li>
    </ul>
  </div>
  <div class="card">
    <h4 style="margin:0 0 6px">Explicitly NOT in the pilot</h4>
    <ul style="margin:0">
      <li>The remote collector service/app and cross-harness auth/discovery.</li>
      <li>A live push transport (WebSocket/SSE) — polling by watermark for now.</li>
      <li>Any event type beyond <span class="tn">turn.ended</span> (the mechanism is built to grow).</li>
      <li>Surfacing the feed inside the React UI (the in-repo test app is the consumer).</li>
    </ul>
  </div>
`;
</script>
</body>
</html>
